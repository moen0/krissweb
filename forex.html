<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forex Overview</title>
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
<canvas id="caustics"></canvas>
<div class="container">
  <header>
    <h1>Forex Overview</h1>
    <div class="controls">
      <button class="theme-toggle" aria-label="Toggle theme">
        <span class="light-label">Light</span>
        <span class="dark-label" style="display: none;">Dark</span>
      </button>
      <a href="https://github.com/moen0" class="github-link" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
        </svg>
      </a>
    </div>
  </header>
  <nav class="breadcrumb">
    <a href="index.html">Home</a>
    <span class="separator">›</span>
    <span>Forex Overview</span>
  </nav>

  <!-- Place this inside your .container, after the header -->

  <div class="stats-grid">
    <div class="stat-box stat-wide">
      <span class="stat-label">Equity</span>
      <span id="equity" class="stat-value">—</span>
    </div>
    <div class="stat-box stat-wide">
      <span class="stat-label">Balance</span>
      <span id="balance" class="stat-value">—</span>
    </div>
  </div>

  <div class="stats-grid triple">
    <div class="stat-box">
      <span class="stat-label">Win rate</span>
      <span id="win-rate" class="stat-value">—</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">Average profit</span>
      <span id="avg-profit" class="stat-value profit">—</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">Average loss</span>
      <span id="avg-loss" class="stat-value loss">—</span>
    </div>
  </div>

  <div class="stats-grid triple">
    <div class="stat-box">
      <span class="stat-label">Number of trades</span>
      <span id="num-trades" class="stat-value">—</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">Sharpe Ratio</span>
      <span id="sharpe" class="stat-value">—</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">Profit factor</span>
      <span id="profit-factor" class="stat-value">—</span>
    </div>
  </div>

  <div class="stats-grid triple">
    <div class="stat-box">
      <span class="stat-label">Average RRR</span>
      <span id="avg-rrr" class="stat-value">—</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">Expectancy</span>
      <span id="expectancy" class="stat-value">—</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">Max Drawdown</span>
      <span id="max-dd" class="stat-value loss">—</span>
    </div>
  </div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="Scripting/forex-stats.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="Scripting/caustics.js"></script>
<script src="Scripting/script.js"></script>
</body>
</html>
